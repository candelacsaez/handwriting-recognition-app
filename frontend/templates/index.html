<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconnaissance d'écriture en temps réel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>✍️ Reconnaissance d'écriture en temps réel</h1>
        
        <div class="status-bar">
            <span class="status-indicator">🟢</span>
            <span>Mode temps réel activé</span>
        </div>
        
        <div class="canvas-container">
            <canvas id="drawingCanvas"></canvas>
        </div>
        
        <div class="controls">
            <button id="clearBtn" class="btn btn-clear">🗑️ Effacer</button>
            <button id="recognizeBtn" class="btn btn-secondary">🔄 Reconnaître maintenant</button>
        </div>
        
        <div class="result-container">
            <h2>Résultat :</h2>
            <div id="result" class="result-text">Chargement...</div>
            <div id="confidence" class="confidence"></div>
        </div>
        
        <div class="info">
            <p>💡 <strong>Mode temps réel :</strong> La reconnaissance se fait automatiquement 800ms après avoir arrêté d'écrire</p>
            <p>📱 Compatible tablette et stylet</p>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/canvas.js') }}"></script>
</body>
</html>
